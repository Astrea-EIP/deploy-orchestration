name: Validate environments

on:
  pull_request:
    paths:
      - "environments/*.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Validate preprod
        run: python scripts/validate_env.py environments/preprod.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate prod
        run: python scripts/validate_env.py environments/prod.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}