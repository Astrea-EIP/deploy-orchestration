name: 🐛 Bug
description: Report a bug
title: "fix: "
labels: ["type: bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug description
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots