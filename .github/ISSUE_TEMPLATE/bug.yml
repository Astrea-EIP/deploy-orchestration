name: Bug
description: Report a defect that requires a fix
title: "fix: "
labels: ["type:bug", "area:devops", "priority:P1-high"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the incorrect behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add logs, screenshots, or other useful context.
