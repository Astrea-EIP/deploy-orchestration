name: 🚀 Feature
description: Add a new feature
title: "feat: "
labels: ["type: feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: What needs to be built?
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: Business value
      placeholder: Why is this needed?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] condition 1
        - [ ] condition 2
    validations:
      required: true